<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        const suppressPatterns = ["emit", "addListener", "reading 'emit'", "reading 'addListener'"];
        
        const shouldSuppress = function(errorMsg) {
          if (!errorMsg) return false;
          const msgStr = String(errorMsg);
          return suppressPatterns.some(function(pattern) {
            return msgStr.toLowerCase().indexOf(pattern.toLowerCase()) !== -1;
          });
        };

        // 1. Intercept console.warn and console.error to silence any remaining output
        const originalWarn = console.warn;
        console.warn = function(...args) {
          const joined = args.map(function(arg) {
            try {
              return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
            } catch(e) {
              return String(arg);
            }
          }).join(" ");
          if (shouldSuppress(joined)) {
            return;
          }
          return originalWarn.apply(console, args);
        };

        const originalError = console.error;
        console.error = function(...args) {
          const joined = args.map(function(arg) {
            try {
              return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
            } catch(e) {
              return String(arg);
            }
          }).join(" ");
          if (shouldSuppress(joined)) {
            return;
          }
          return originalError.apply(console, args);
        };

        // 2. Monkeypatch window.addEventListener to intercept events early and prevent browser defaults
        const originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
          if (type === 'unhandledrejection' || type === 'error') {
            const wrappedListener = function(event) {
              let errorMsg = '';
              if (type === 'unhandledrejection' && event && event.reason) {
                const reason = event.reason;
                errorMsg = typeof reason === 'object' ? (reason.message || reason.stack || '') : String(reason);
              } else if (type === 'error' && event) {
                errorMsg = event.message || '';
              }
              
              if (shouldSuppress(errorMsg)) {
                try {
                  event.preventDefault();
                  event.stopPropagation();
                  event.stopImmediatePropagation();
                } catch(e) {}
                return;
              }
              
              if (typeof listener === 'function') {
                return listener.call(this, event);
              } else if (listener && typeof listener.handleEvent === 'function') {
                return listener.handleEvent(event);
              }
            };
            
            if (!this._wrappedListeners) {
              this._wrappedListeners = new Map();
            }
            this._wrappedListeners.set(listener, wrappedListener);
            return originalAddEventListener.call(this, type, wrappedListener, options);
          }
          return originalAddEventListener.call(this, type, listener, options);
        };

        const originalRemoveEventListener = window.removeEventListener;
        window.removeEventListener = function(type, listener, options) {
          if ((type === 'unhandledrejection' || type === 'error') && this._wrappedListeners) {
            const wrapped = this._wrappedListeners.get(listener);
            if (wrapped) {
              this._wrappedListeners.delete(listener);
              return originalRemoveEventListener.call(this, type, wrapped, options);
            }
          }
          return originalRemoveEventListener.call(this, type, listener, options);
        };

        // 3. Monkeypatch window.onerror and window.onunhandledrejection
        let userOnError = null;
        Object.defineProperty(window, 'onerror', {
          configurable: true,
          enumerable: true,
          get: function() { return userOnError; },
          set: function(val) {
            if (typeof val === 'function') {
              userOnError = function(message, source, lineno, colno, error) {
                if (shouldSuppress(message)) {
                  return true;
                }
                return val.call(this, message, source, lineno, colno, error);
              };
            } else {
              userOnError = val;
            }
          }
        });

        let userOnUnhandledRejection = null;
        Object.defineProperty(window, 'onunhandledrejection', {
          configurable: true,
          enumerable: true,
          get: function() { return userOnUnhandledRejection; },
          set: function(val) {
            if (typeof val === 'function') {
              userOnUnhandledRejection = function(event) {
                let errorMsg = '';
                if (event && event.reason) {
                  const reason = event.reason;
                  errorMsg = typeof reason === 'object' ? (reason.message || reason.stack || '') : String(reason);
                }
                if (shouldSuppress(errorMsg)) {
                  try {
                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();
                  } catch(e) {}
                  return;
                }
                return val.call(this, event);
              };
            } else {
              userOnUnhandledRejection = val;
            }
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
